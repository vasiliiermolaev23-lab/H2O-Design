kind = "web"
previewPath = "/"
title = "H2O Cleaning"
version = "1.0.0"
id = "artifacts/h2o-cleaning"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22232

[services.development]
run = "pnpm --filter @workspace/h2o-cleaning run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/h2o-cleaning", "run", "build" ]
publicDir = "artifacts/h2o-cleaning/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22232"
BASE_PATH = "/"
